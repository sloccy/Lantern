name: Build & Publish

on:
  push:
    branches: [main, master]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lantern

jobs:
  build:
    name: Build linux/amd64
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      # ── 1. Source ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Go — resolve deps and generate go.sum ──────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true   # caches $GOPATH/pkg/mod between runs

      - name: Tidy modules
        run: go mod tidy

      # ── 3. Docker infrastructure ──────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Image tags & labels ────────────────────────────────────────────
      # Produces tags like:
      #   latest           (default branch only)
      #   main / master    (branch push)
      #   v1.2.3           (annotated tag)
      #   1.2              (semver major.minor)
      #   sha-abc1234      (always — useful for pinning)
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr,prefix=pr-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=Lantern
            org.opencontainers.image.description=Homelab reverse proxy, service discovery & homepage
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # ── 5. Build & push ───────────────────────────────────────────────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          # Only push on branch/tag pushes — not on pull requests.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — dramatically speeds up repeated builds.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass build metadata for image inspection.
          build-args: |
            BUILD_VERSION=${{ github.ref_type == 'tag' && github.ref_name || 'dev' }}
            BUILD_COMMIT=${{ github.sha }}
