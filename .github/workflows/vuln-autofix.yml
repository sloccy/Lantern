name: Go vuln auto-fix

on:
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: govulncheck & auto-fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan, parse, and bump vulnerable deps
        id: scan
        run: |
          set -euo pipefail

          # Exit code 3 = vulnerabilities found; allow it so the script can decide.
          govulncheck -json ./... > /tmp/vuln.json || true

          # Phase 1: collect OSV IDs that are *called* (symbol-level hit).
          CALLED=$(jq -r '
            select(.finding) |
            select(.finding.trace[0]?.function != null) |
            .finding.osv
          ' /tmp/vuln.json | sort -u)

          if [ -z "$CALLED" ]; then
            echo "No called vulnerabilities found — nothing to do."
            echo "bumped=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Called vuln OSV IDs: $CALLED"

          # Phase 2: for each called OSV, find module@fixed_version.
          # Multiple OSVs may fix the same module — collect all and pick the highest per module.
          BUMPS_FILE=$(mktemp)
          for osv_id in $CALLED; do
            jq -r --arg id "$osv_id" '
              select(.osv) |
              select(.osv.id == $id) |
              .osv.affected[]? |
              select(.package.ecosystem == "Go") |
              .package.name as $mod |
              (.ranges[]?.events[]?.fixed // empty) as $fix |
              select($fix != "" and ($fix | test("^[0-9]"))) |
              "\($mod)@\($fix)"
            ' /tmp/vuln.json >> "$BUMPS_FILE"
          done

          if [ ! -s "$BUMPS_FILE" ]; then
            echo "Called vulns found but no fixed versions available — nothing to bump."
            echo "bumped=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Dedupe: per module, keep only the highest semver fixed version.
          # sort -k2,2V gives correct semver ordering (1.10 > 1.9); awk keeps the last (highest) per module.
          FINAL=$(sort -u "$BUMPS_FILE" \
            | sort -t '@' -k1,1 -k2,2V \
            | awk -F'@' '{ latest[$1] = $0 } END { for (m in latest) print latest[m] }')

          echo "Bumping: $FINAL"

          for bump in $FINAL; do
            go get "$bump"
          done
          go mod tidy

          # Store bump list for the PR body.
          echo "bumped<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FINAL" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Verify no called vulns remain
        if: steps.scan.outputs.bumped != ''
        run: govulncheck ./...

      - name: Open PR
        id: create-pr
        if: steps.scan.outputs.bumped != ''
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/vuln-autofix
          commit-message: "chore: bump deps for govulncheck findings"
          title: "chore: bump deps for govulncheck findings"
          labels: security,dependencies
          body: |
            Automated dependency bump for Go vulnerabilities detected by `govulncheck`.

            **Bumped modules:**
            ```
            ${{ steps.scan.outputs.bumped }}
            ```

            All changes were verified clean by a second `govulncheck` pass.

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUM: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          # Close and reopen forces required checks to run on GITHUB_TOKEN-authored PRs.
          gh pr close --comment "triggering CI" "$PR_NUM"
          gh pr reopen "$PR_NUM"
          gh pr merge --auto --squash "$PR_NUM"
