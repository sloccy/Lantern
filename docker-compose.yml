services:
  lantern:
    build: .
    container_name: lantern
    restart: unless-stopped

    # Raw socket access for ARP pre-sweep (faster network scanning) and mDNS/WS-Discovery multicast.
    # NET_BIND_SERVICE is not needed here — port 80/443 binding is handled via a file capability
    # set on the binary at build time (setcap cap_net_bind_service=+ep).
    cap_add:
      - NET_RAW

    # Add the host's docker group so the nonroot user can access /var/run/docker.sock.
    # Find the GID with: stat -c '%g' /var/run/docker.sock
    group_add:
      - "1000"

    # Use host networking for mDNS and WS-Discovery multicast support.
    # Without this, mDNS (port 5353) and WS-Discovery (port 3702) are blocked
    # by Docker bridge NAT. Replace the 'ports' section below with this.
    network_mode: host

    # Standard port mapping. Switch to 'network_mode: host' above for full
    # multicast support (mDNS + WS-Discovery). If using host networking,
    # remove this ports section entirely.
    #ports:
    #  - "80:80"
    #  - "443:443"

    volumes:
      # Persistent data: config, certs, ACME account keys.
      - lantern_data:/data
      # Docker socket for container discovery.
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      # Your root domain. Wildcard cert will cover *.yourdomain.com
      DOMAIN: ""

      # Cloudflare API token with Zone:DNS:Edit permission for your zone.
      CF_API_TOKEN: ""

      # Cloudflare Zone ID (found in the zone overview page).
      CF_ZONE_ID: ""

      # Cloudflare Account ID (found on the dashboard right sidebar).
      # Required for tunnel management. Once set, use Manage → Cloudflare Tunnel
      # in the UI to create the tunnel. The ID and token are persisted automatically.
      # CF_ACCOUNT_ID: ""

      # Local IP of this server — used for DNS A records (not needed in tunnel mode).
      SERVER_IP: ""

      # Data directory inside the container (maps to the volume above).
      DATA_DIR: /data

      # How often to run a network scan. Accepts Go duration strings.
      # Examples: 24h, 12h, 6h, 30m
      SCAN_INTERVAL: "24h"

      # TCP dial timeout per port during network scans, in milliseconds.
      # Increase if scanning slow links or VLANs. Default: 200
      # SCAN_TIMEOUT_MS: "200"


volumes:
  lantern_data:
    driver: local
