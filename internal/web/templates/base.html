{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}Lantern{{end}}</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!--
    CSS STACK — READ BEFORE EDITING TEMPLATES OR style.css
    =======================================================
    We use Bulma 1.0 as a plain CDN stylesheet (no build step, no JS framework).

    BULMA COMPONENT CLASSES IN USE:
      button, is-small, is-ghost, is-warning, is-danger, is-outlined
      card, card-header, card-header-title, card-content
      table, is-narrow, is-striped, is-hoverable, is-fullwidth
      tag, is-info, is-success, is-light, is-warning
      input, notification, is-danger, is-success
      is-flex, is-flex-wrap-wrap, is-align-items-center, is-justify-content-flex-end
      mb-3, mt-3, gap-2, gap-3, has-text-centered, p-4, is-sr-only

    LAYOUT NOTE:
      All custom layout, animations, and component styling live in style.css.
      Bulma provides base component styles; style.css overrides via .manage-card
      and other scoped selectors for the dark theme.

    MODAL NOTE:
      We use the native <dialog> element with .showModal() / .close() for the
      shared app modal. Do NOT use Bulma's .modal class — it conflicts with the
      native dialog display mechanism. Use .dialog-box for the inner content.
  -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  <link rel="stylesheet" href="/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <script defer src="/app.js"></script>
</head>
<body{{block "body-attrs" .}}{{end}}>

<div id="htmx-topbar"></div>

{{block "content" .}}{{end}}

<!-- Modal: native <dialog> — opened with .showModal(), closed with .close() -->
<dialog id="app-modal">
  <div class="dialog-box">
    <button class="delete" onclick="this.closest('dialog').close()"></button>
    <div id="modal-content"></div>
  </div>
  <form method="dialog" class="dialog-backdrop"><button>close</button></form>
</dialog>

<!-- Toast -->
<div id="toast-container" class="toast-container">
  <div id="app-toast" class="notification" role="alert" style="display:none">
    <span id="toast-msg"></span>
  </div>
</div>

{{block "scripts" .}}{{end}}
</body>
</html>
{{end}}
