{{template "base" .}}

{{define "title"}}Lantern{{end}}

{{define "content"}}
<header class="header">
  <div class="logo">
    <img src="/logo.webp" class="logo-img" alt="Lantern">
    <span class="logo-text">Lantern</span>
  </div>
  <input id="search-input" class="search-input form-control" type="search"
         name="q"
         placeholder="Search… ( / )" autocomplete="off">
  <div class="header-right">
<input type="checkbox" id="edit-layout-toggle" class="visually-hidden">
    <label for="edit-layout-toggle" class="btn btn-link" id="edit-layout-btn">✎ Edit Layout</label>
    <a href="/manage" class="btn btn-link">⚙ Manage</a>
  </div>
</header>

<div id="sysinfo-wrapper" class="bg-poll"
     hx-get="/fragments/sysinfo"
     hx-trigger="load, every 10s [document.visibilityState==='visible']"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"><div class="spinner-border spinner-border-sm" role="status"></div></div>
</div>

<div id="services-grid" class="grid-root"
     hx-get="/fragments/services"
     hx-trigger="input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  {{.ServicesHTML}}
</div>

<div id="bookmarks-home"
     hx-get="/fragments/bookmarks"
     hx-trigger="input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  {{.BookmarksHTML}}
</div>
{{end}}

{{define "scripts"}}
<script>
  const _topbar = document.getElementById('htmx-topbar');
  htmx.on('htmx:beforeRequest', (e) => {
    if (!e.detail.elt.classList.contains('bg-poll')) _topbar.classList.add('active');
  });
  htmx.on('htmx:afterRequest', () => _topbar.classList.remove('active'));
</script>
{{end}}
