<div class="sysinfo-bar">
  <span class="sysinfo-label">RAM</span>
  <div class="mini-bar"><div class="mini-bar-fill" style="width:{{printf "%.0f" .MemPercent}}%"></div></div>
  {{fmtMem .MemUsedMB}} / {{fmtMem .MemTotalMB}}
  <span class="sysinfo-sep">|</span>
  <span class="sysinfo-label">Disk</span>
  <div class="mini-bar"><div class="mini-bar-fill" style="width:{{printf "%.0f" .DiskPercent}}%"></div></div>
  {{.DiskUsedGB}} / {{.DiskTotalGB}} GB
</div>
