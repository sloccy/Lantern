{{if .Bookmark}}
<h3>Edit Bookmark</h3>
<form hx-put="/api/bookmarks/{{.Bookmark.ID}}"
      hx-swap="none">
  <div class="mb-3">
    <label>Name</label>
    <input class="input" name="name" value="{{.Bookmark.Name}}" placeholder="My Bookmark">
  </div>
  <div class="mb-3">
    <label>URL</label>
    <input class="input" name="url" type="url" value="{{.Bookmark.URL}}" required placeholder="https://example.com">
  </div>
  <div class="mb-3">
    <label>Category</label>
    <input class="input" name="category" value="{{.Bookmark.Category}}" list="categories-list" placeholder="Optional">
    <datalist id="categories-list">
      {{range .Categories}}<option value="{{.}}">{{end}}
    </datalist>
  </div>
  <div class="is-flex gap-2 is-justify-content-flex-end mt-3">
    <button type="button" class="button is-ghost" onclick="this.closest('dialog').close()">Cancel</button>
    <button type="submit" class="button is-warning">Save</button>
  </div>
</form>
{{else}}
<h3>Add Bookmark</h3>
<form hx-post="/api/bookmarks"
      hx-swap="none">
  <div class="mb-3">
    <label>Name</label>
    <input class="input" name="name" placeholder="My Bookmark">
  </div>
  <div class="mb-3">
    <label>URL</label>
    <input class="input" name="url" type="url" required placeholder="https://example.com">
  </div>
  <div class="mb-3">
    <label>Category</label>
    <input class="input" name="category" list="categories-list" placeholder="Optional">
    <datalist id="categories-list">
      {{range .Categories}}<option value="{{.}}">{{end}}
    </datalist>
  </div>
  <div class="is-flex gap-2 is-justify-content-flex-end mt-3">
    <button type="button" class="button is-ghost" onclick="this.closest('dialog').close()">Cancel</button>
    <button type="submit" class="button is-warning">Add Bookmark</button>
  </div>
</form>
{{end}}
