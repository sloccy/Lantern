{{if .Bookmark}}
<h3>Edit Bookmark</h3>
<form hx-put="/api/bookmarks/{{.Bookmark.ID}}"
      hx-swap="none">
  <div class="mb-3">
    <label>Name</label>
    <input class="form-control" name="name" value="{{.Bookmark.Name}}" placeholder="My Bookmark">
  </div>
  <div class="mb-3">
    <label>URL</label>
    <input class="form-control" name="url" type="text" value="{{.Bookmark.URL}}" required placeholder="example.com">
  </div>
  <div class="mb-3">
    <label>Category</label>
    <input class="form-control" name="category" value="{{.Bookmark.Category}}" list="categories-list" placeholder="Optional">
    <datalist id="categories-list">
      {{range .Categories}}<option value="{{.}}">{{end}}
    </datalist>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-3">
    <button type="button" class="btn btn-link" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-warning">Save</button>
  </div>
</form>
{{else}}
<h3>Add Bookmark</h3>
<form hx-post="/api/bookmarks"
      hx-swap="none">
  <div class="mb-3">
    <label>Name</label>
    <input class="form-control" name="name" placeholder="My Bookmark">
  </div>
  <div class="mb-3">
    <label>URL</label>
    <input class="form-control" name="url" type="text" required placeholder="example.com">
  </div>
  <div class="mb-3">
    <label>Category</label>
    <input class="form-control" name="category" list="categories-list" placeholder="Optional">
    <datalist id="categories-list">
      {{range .Categories}}<option value="{{.}}">{{end}}
    </datalist>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-3">
    <button type="button" class="btn btn-link" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-warning">Add Bookmark</button>
  </div>
</form>
{{end}}
