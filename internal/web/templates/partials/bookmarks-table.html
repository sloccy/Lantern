{{if .}}
<div class="table-container">
  <table class="table is-narrow is-striped is-hoverable is-fullwidth">
    <thead>
      <tr><th>Name</th><th>URL</th><th>Category</th><th></th></tr>
    </thead>
    <tbody>
      {{range .}}
      <tr>
        <td>{{.Name}}</td>
        <td class="link-cell">
          <a href="{{.URL}}" target="_blank" rel="noopener">{{.URL}}</a>
        </td>
        <td>{{if .Category}}{{.Category}}{{else}}—{{end}}</td>
        <td class="td-actions">
          <button class="button is-outlined is-small"
                  hx-get="/fragments/bookmark-form/{{.ID}}"
                  hx-target="#modal-content">Edit</button>
          <button class="button is-danger is-small"
                  hx-delete="/api/bookmarks/{{.ID}}"
                  hx-target="closest tr"
                  hx-swap="delete"
                  hx-confirm="Delete {{.Name}}?">Delete</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="has-text-centered empty-msg p-4">No bookmarks yet.</p>
{{end}}
