{{if .}}
<div class="overflow-x-auto">
  <table class="table table-sm table-zebra table-pin-rows">
    <thead>
      <tr><th>Name</th><th>URL</th><th>Category</th><th></th></tr>
    </thead>
    <tbody>
      {{range .}}
      <tr>
        <td>{{.Name}}</td>
        <td class="link-cell">
          <a href="{{.URL}}" target="_blank" rel="noopener">{{.URL}}</a>
        </td>
        <td>{{if .Category}}{{.Category}}{{else}}—{{end}}</td>
        <td class="td-actions">
          <button class="btn btn-outline btn-sm"
                  hx-get="/fragments/bookmark-form/{{.ID}}"
                  hx-target="#modal-content">Edit</button>
          <button class="btn btn-error btn-sm"
                  hx-delete="/api/bookmarks/{{.ID}}"
                  hx-target="closest tr"
                  hx-swap="delete"
                  hx-confirm="Delete {{.Name}}?">Delete</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="text-center opacity-60 p-4">No bookmarks yet.</p>
{{end}}
