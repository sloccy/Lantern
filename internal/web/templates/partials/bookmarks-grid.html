{{if .Groups}}
<div class="grid-root bookmarks-home">
  <div class="bookmarks-divider">Bookmarks</div>
  {{range $i, $g := .Groups}}
  <div class="category-group" data-cat="{{$g.Name}}">
    {{if $g.Name}}
    <details open data-storage-key="bcat:{{$g.Name}}">
      <summary class="category-header">
        <span class="category-arrow">▾</span>
        <span class="category-name">{{$g.Name}}</span>
        <span class="category-count">{{len $g.Bookmarks}}</span>
      </summary>
      <div class="grid">
    {{else}}
    <div class="grid">
    {{end}}
      {{range $g.Bookmarks}}
      <div class="card-wrapper">
        <a class="bookmark-card service-card" href="{{.URL}}"
           target="_blank" rel="noopener" data-name="{{.Name}}">
          {{iconEl .ID .Icon .URL "card-icon"}}
          <div class="card-name">{{.Name}}</div>
          <div class="card-url">{{.URL}}</div>
        </a>
        <div class="reorder-btns">
          <button class="btn btn-ghost btn-sm reorder-btn"
                  hx-post="/api/bookmarks/{{.ID}}/move"
                  hx-vals='{"direction":"left"}'
                  hx-swap="none">←</button>
          <button class="btn btn-ghost btn-sm reorder-btn"
                  hx-post="/api/bookmarks/{{.ID}}/move"
                  hx-vals='{"direction":"right"}'
                  hx-swap="none">→</button>
        </div>
      </div>
      {{end}}
    </div>
    {{if $g.Name}}</details>{{end}}
  </div>
  {{end}}
</div>
{{end}}
