{{if .Services}}
<div class="overflow-x-auto">
  <table class="table table-zebra table-sm">
    <thead>
      <tr>
        <th class="td-icon"></th>
        <th>Name</th>
        <th>Subdomain</th>
        <th>Target</th>
        <th>Source</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      {{range .Services}}
      <tr>
        <td class="td-icon">{{iconEl .Icon .Target "svc-icon"}}</td>
        <td>{{.Name}}</td>
        <td class="link-cell">
          {{if .DirectOnly}}
            <a href="{{.Target}}" target="_blank" rel="noopener">{{.Target}}</a>
          {{else}}
            <a href="{{serviceURL .Subdomain $.Domain}}" target="_blank" rel="noopener">{{.Subdomain}}.{{$.Domain}}</a>
          {{end}}
        </td>
        <td><code style="font-size:.8rem">{{.Target}}</code></td>
        <td>
          <span class="{{tagClass .Source}}">{{.Source}}</span>
          {{if isTunneled .}}<span class="badge badge-warning">tunnel</span>{{end}}
        </td>
        <td class="td-actions">
          <div class="flex gap-2 items-center justify-end">
            <button class="btn btn-ghost btn-sm"
                    hx-get="/fragments/service-form/{{.ID}}"
                    hx-target="#modal-content">Edit</button>
            <button class="btn btn-error btn-sm"
                    hx-delete="/api/services/{{.ID}}"
                    hx-target="closest tr"
                    hx-swap="delete"
                    hx-confirm="Delete {{.Name}}?">Delete</button>
          </div>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="text-center opacity-60 p-4">No services assigned yet.</p>
{{end}}
