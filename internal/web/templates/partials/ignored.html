{{if .}}
<div class="overflow-x-auto">
  <table class="table table-sm table-zebra table-pin-rows">
    <thead><tr><th>IP:Port</th><th>Title</th><th>Ignored At</th><th></th></tr></thead>
    <tbody>
      {{range .}}
      <tr>
        <td><code>{{.IP}}:{{.Port}}</code></td>
        <td>{{if .Title}}{{.Title}}{{else}}—{{end}}</td>
        <td>{{fmtTime .IgnoredAt}}</td>
        <td class="td-actions">
          <button class="btn btn-outline btn-sm"
                  hx-delete="/api/ignored/{{.ID}}"
                  hx-target="closest tr"
                  hx-swap="delete">Un-ignore</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="opacity-60" style="text-align:center;padding:1rem 2rem">No ignored services.</p>
{{end}}
