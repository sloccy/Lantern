{{if .}}
<div class="overflow-x-auto">
  <table class="table table-zebra table-sm">
    <thead><tr><th>IP:Port</th><th>Title</th><th>Ignored At</th><th></th></tr></thead>
    <tbody>
      {{range .}}
      <tr>
        <td><code>{{.IP}}:{{.Port}}</code></td>
        <td>{{if .Title}}{{.Title}}{{else}}—{{end}}</td>
        <td>{{fmtTime .IgnoredAt}}</td>
        <td class="td-actions">
          <div class="flex gap-2 items-center justify-end">
            <button class="btn btn-ghost btn-sm"
                    hx-delete="/api/ignored/{{.ID}}"
                    hx-target="closest tr"
                    hx-swap="delete">Un-ignore</button>
          </div>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="text-center opacity-60 p-4">No ignored services.</p>
{{end}}
