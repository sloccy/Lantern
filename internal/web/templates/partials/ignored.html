{{if .}}
<div class="table-container">
  <table class="table table-sm table-striped table-hover w-100">
    <thead><tr><th>IP:Port</th><th>Title</th><th>Ignored At</th><th></th></tr></thead>
    <tbody>
      {{range .}}
      <tr>
        <td><code>{{.IP}}:{{.Port}}</code></td>
        <td>{{if .Title}}{{.Title}}{{else}}—{{end}}</td>
        <td>{{fmtTime .IgnoredAt}}</td>
        <td class="td-actions">
          <div class="d-flex align-items-center justify-content-end gap-2">
            <button class="btn btn-outline-secondary btn-sm"
                    hx-delete="/api/ignored/{{.ID}}"
                    hx-target="closest tr"
                    hx-swap="delete">Un-ignore</button>
          </div>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="empty-msg">No ignored services.</p>
{{end}}
