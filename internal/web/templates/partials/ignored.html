{{if .}}
<div class="table-responsive">
  <table class="table table-hover mb-0">
    <thead><tr><th>IP:Port</th><th>Title</th><th>Ignored At</th><th></th></tr></thead>
    <tbody>
      {{range .}}
      <tr>
        <td><code>{{.IP}}:{{.Port}}</code></td>
        <td>{{if .Title}}{{.Title}}{{else}}—{{end}}</td>
        <td>{{fmtTime .IgnoredAt}}</td>
        <td class="td-actions d-flex gap-2 align-items-center justify-content-end">
          <button class="btn btn-outline-secondary btn-sm"
                  hx-delete="/api/ignored/{{.ID}}"
                  hx-target="closest tr"
                  hx-swap="delete">Un-ignore</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="text-center text-secondary p-4">No ignored services.</p>
{{end}}
