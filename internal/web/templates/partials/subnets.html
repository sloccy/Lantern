{{if .Subnets}}
<div class="table-container">
  <table class="table table-sm table-striped table-hover w-100">
    <thead><tr><th>CIDR</th><th></th></tr></thead>
    <tbody>
      {{range .Subnets}}
      <tr>
        <td><code>{{.}}</code></td>
        <td class="td-actions">
          <div class="d-flex align-items-center justify-content-end gap-2">
            <button class="btn btn-danger btn-sm"
                    hx-delete="/api/scan/subnets?cidr={{qesc .}}"
                    hx-target="closest tr"
                    hx-swap="delete"
                    hx-confirm="Delete subnet {{.}}?">Delete</button>
          </div>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="empty-msg">No subnets configured — local /24 is auto-detected.</p>
{{end}}
<div class="card-form-row">
  <form hx-post="/api/scan/subnets"
        hx-target="#subnets-list"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input class="form-control" name="cidr" placeholder="10.0.1.0/24" required>
    <button class="btn btn-warning btn-sm" type="submit">+ Add</button>
  </form>
</div>
