{{if .Subnets}}
<div class="table-wrap">
  <table>
    <thead><tr><th>CIDR</th><th></th></tr></thead>
    <tbody>
      {{range .Subnets}}
      <tr>
        <td><code>{{.}}</code></td>
        <td class="actions">
          <button class="btn btn-danger btn-sm"
                  hx-delete="/api/scan/subnets?cidr={{qesc .}}"
                  hx-target="closest tr"
                  hx-swap="delete"
                  hx-confirm="Remove subnet {{.}}?">Remove</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="empty-small">No subnets configured — local /24 is auto-detected.</p>
{{end}}
<div class="subnet-add-form">
  <form hx-post="/api/scan/subnets"
        hx-target="#subnets-list"
        hx-swap="innerHTML"
        class="subnet-form-row"
        hx-on::after-request="this.reset()">
    <input class="subnet-input" name="cidr" placeholder="10.0.1.0/24" required>
    <button class="btn btn-primary btn-sm" type="submit">+ Add</button>
  </form>
</div>
