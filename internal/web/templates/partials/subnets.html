{{if .Subnets}}
<div class="table-container">
  <table class="table is-narrow is-striped is-hoverable is-fullwidth">
    <thead><tr><th>CIDR</th><th></th></tr></thead>
    <tbody>
      {{range .Subnets}}
      <tr>
        <td><code>{{.}}</code></td>
        <td class="td-actions">
          <button class="button is-danger is-small"
                  hx-delete="/api/scan/subnets?cidr={{qesc .}}"
                  hx-target="closest tr"
                  hx-swap="delete"
                  hx-confirm="Delete subnet {{.}}?">Delete</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="empty-msg" style="text-align:center;padding:1rem 2rem">No subnets configured — local /24 is auto-detected.</p>
{{end}}
<div class="card-form-row">
  <form hx-post="/api/scan/subnets"
        hx-target="#subnets-list"
        hx-swap="innerHTML"
        hx-on::after-request="this.reset()">
    <input class="input" name="cidr" placeholder="10.0.1.0/24" required>
    <button class="button is-warning is-small" type="submit">+ Add</button>
  </form>
</div>
