{{if .Subnets}}
<div class="table-wrap">
  <table class="table table-hover mb-0">
    <thead><tr><th>CIDR</th><th></th></tr></thead>
    <tbody>
      {{range .Subnets}}
      <tr>
        <td><code>{{.}}</code></td>
        <td class="td-actions"><div class="actions">
          <button class="btn btn-danger btn-sm"
                  hx-delete="/api/scan/subnets?cidr={{qesc .}}"
                  hx-target="closest tr"
                  hx-swap="delete"
                  hx-confirm="Delete subnet {{.}}?">Delete</button>
        </div></td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="text-center text-secondary p-4">No subnets configured — local /24 is auto-detected.</p>
{{end}}
<div class="p-3 border-top">
  <form hx-post="/api/scan/subnets"
        hx-target="#subnets-list"
        hx-swap="innerHTML"
        class="d-flex gap-2 align-items-center"
        hx-on::after-request="this.reset()">
    <input class="form-control" name="cidr" placeholder="10.0.1.0/24" required>
    <button class="btn btn-warning btn-sm" type="submit">+ Add</button>
  </form>
</div>
