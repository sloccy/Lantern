{{if .Service}}
<h3>Edit Service</h3>
<form hx-put="/api/services/{{.Service.ID}}"
      hx-swap="none">

  <input type="hidden" name="discovered_id" value="">

  <div class="form-group">
    <label>Icon</label>
    {{template "icon-preview.html" .Service}}
    <div class="icon-edit-row" style="margin-top:.5rem">
      <label class="btn btn-ghost btn-sm" style="cursor:pointer">
        Upload
        <input type="file" name="icon" accept="image/*" style="display:none"
               hx-post="/api/services/{{.Service.ID}}/icon"
               hx-encoding="multipart/form-data"
               hx-trigger="change"
               hx-target="#icon-preview"
               hx-swap="outerHTML">
      </label>
      <button type="button" class="btn btn-ghost btn-sm"
              hx-post="/api/services/{{.Service.ID}}/favicon"
              hx-target="#icon-preview"
              hx-swap="outerHTML">Pull Favicon</button>
      <button type="button" class="btn btn-ghost btn-sm"
              hx-delete="/api/services/{{.Service.ID}}/icon"
              hx-target="#icon-preview"
              hx-swap="outerHTML">Clear</button>
    </div>
  </div>

  <div class="form-group">
    <label>Name</label>
    <input name="name" value="{{.Service.Name}}" required>
  </div>

  <div x-data="{direct: {{if .Service.DirectOnly}}true{{else}}false{{end}}}">
    <input type="hidden" name="direct_only_present" value="1">
    <div class="form-group" x-show="!direct">
      <label>Subdomain</label>
      <div x-data="{sub: '{{.Service.Subdomain}}'}" style="position:relative">
        <input name="subdomain" x-model="sub">
        <div class="input-hint" x-text="sub + '.{{.Domain}}'"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Target URL</label>
      <input name="target" value="{{.Service.Target}}" placeholder="http://10.0.0.5:8080" required>
    </div>
    <div class="form-group">
      <label>Category</label>
      <input name="category" value="{{.Service.Category}}" list="categories-list" placeholder="Optional">
      <datalist id="categories-list">
        {{range .Categories}}<option value="{{.}}">{{end}}
      </datalist>
    </div>
    <input type="hidden" name="tunnel_present" value="1">
    <input type="hidden" name="skip_health_present" value="1">
    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" name="direct_only" x-model="direct" {{if .Service.DirectOnly}}checked{{end}}>
        Direct link
      </label>
      {{if .TunnelEnabled}}
      <label class="checkbox-label">
        <input type="checkbox" name="tunnel" {{if isTunneled .Service}}checked{{end}}>
        Cloudflare Tunnel
      </label>
      {{end}}
      <label class="checkbox-label">
        <input type="checkbox" name="skip_health" {{if .Service.SkipHealth}}checked{{end}}>
        Skip health check
      </label>
    </div>
  </div>
  <div class="form-actions">
    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>
{{else}}
<h3>Add Service</h3>
<form hx-post="/api/services"
      hx-swap="none">

  <input type="hidden" name="discovered_id" value="">

  <div class="form-group">
    <label>Name</label>
    <input name="name" placeholder="My Service">
  </div>

  <div x-data="{direct: false}">
    <div class="form-group" x-show="!direct">
      <label>Subdomain</label>
      <div x-data="{sub: ''}" style="position:relative">
        <input name="subdomain" x-model="sub" placeholder="myservice">
        <div class="input-hint" x-text="sub ? sub + '.{{.Domain}}' : ''"></div>
      </div>
    </div>
    <div class="form-group">
      <label>Target URL</label>
      <input name="target" placeholder="http://10.0.0.5:8080" required>
    </div>
    <div class="form-group">
      <label>Category</label>
      <input name="category" list="categories-list" placeholder="Optional">
      <datalist id="categories-list">
        {{range .Categories}}<option value="{{.}}">{{end}}
      </datalist>
    </div>
    {{if .TunnelEnabled}}
    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" name="direct_only" x-model="direct">
        Direct link
      </label>
      <label class="checkbox-label">
        <input type="checkbox" name="tunnel">
        Cloudflare Tunnel
      </label>
    </div>
    {{else}}
    <div class="checkbox-row">
      <label class="checkbox-label">
        <input type="checkbox" name="direct_only" x-model="direct">
        Direct link
      </label>
    </div>
    {{end}}
  </div>
  <div class="form-actions">
    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-primary">Add Service</button>
  </div>
</form>
{{end}}
