{{if .Domains}}
<div class="table-wrap">
  <table class="table table-hover mb-0">
    <thead><tr><th>Domain</th><th>Points To</th><th></th></tr></thead>
    <tbody>
      {{range .Domains}}
      <tr>
        <td class="ddns-domain">{{.}}</td>
        <td>{{$.PublicIP}}</td>
        <td class="td-actions"><div class="actions">
          <button class="btn btn-danger btn-sm"
                  hx-delete="/api/ddns/{{.}}"
                  hx-target="closest tr"
                  hx-swap="delete"
                  hx-confirm="Delete {{.}}?">Delete</button>
        </div></td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="text-center text-secondary p-4">No DDNS domains configured.</p>
{{end}}
<div class="p-3 border-top">
  <form hx-post="/api/ddns"
        hx-target="#ddns-list"
        hx-swap="innerHTML"
        class="d-flex gap-2 align-items-center"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input class="form-control" name="domain"
           placeholder="home.example.com" required>
    <button class="btn btn-warning btn-sm" type="submit">+ Add</button>
  </form>
</div>
