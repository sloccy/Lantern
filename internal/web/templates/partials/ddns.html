{{if .Domains}}
<div class="overflow-x-auto">
  <table class="table table-sm table-zebra table-pin-rows">
    <thead><tr><th>Domain</th><th>Points To</th><th></th></tr></thead>
    <tbody>
      {{range .Domains}}
      <tr>
        <td><code>{{.}}</code></td>
        <td>{{$.PublicIP}}</td>
        <td class="td-actions">
          <button class="btn btn-error btn-sm"
                  hx-delete="/api/ddns/{{.}}"
                  hx-target="closest tr"
                  hx-swap="delete"
                  hx-confirm="Delete {{.}}?">Delete</button>
        </td>
      </tr>
      {{end}}
    </tbody>
  </table>
</div>
{{else}}
<p class="opacity-60" style="text-align:center;padding:1rem 2rem">No DDNS domains configured.</p>
{{end}}
<div class="border-t border-base-300">
  <form hx-post="/api/ddns"
        hx-target="#ddns-list"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()">
    <input class="input input-bordered" name="domain"
           placeholder="home.example.com" required>
    <button class="btn btn-warning btn-sm" type="submit">+ Add</button>
  </form>
</div>
