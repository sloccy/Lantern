<h3>Assign Service</h3>
<div style="background:var(--surface2);border-radius:6px;padding:.75rem;margin-bottom:1.25rem;font-size:.85rem">
  <strong>{{.Discovered.IP}}:{{.Discovered.Port}}</strong>
  {{if .Discovered.Title}} · {{.Discovered.Title}}{{end}}
  {{if .Discovered.ServiceName}} · <em>{{.Discovered.ServiceName}}</em>{{end}}
</div>
<form hx-post="/api/services"
      hx-swap="none">

  <input type="hidden" name="discovered_id" value="{{.Discovered.ID}}">

  <div class="form-group">
    <label>Service Name</label>
    <input name="name" value="{{.Discovered.Title}}" placeholder="My Service">
  </div>
  <div class="form-group">
    <label>Subdomain</label>
    <div x-data="{sub: '{{or .Discovered.SuggestedSubdomain .Discovered.ServiceName}}'}">
      <input name="subdomain" x-model="sub" required placeholder="myservice">
      <div class="input-hint" x-text="sub ? sub + '.{{.Domain}}' : ''"></div>
    </div>
  </div>
  <div class="form-group">
    <label>Category</label>
    <input name="category" list="categories-list" placeholder="Optional">
    <datalist id="categories-list">
      {{range .Categories}}<option value="{{.}}">{{end}}
    </datalist>
  </div>
  {{if .TunnelEnabled}}
  <div class="form-group">
    <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer">
      <input type="checkbox" name="tunnel">
      Route via Cloudflare Tunnel
    </label>
  </div>
  {{end}}
  <div class="form-actions">
    <button type="button" class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-primary">Assign</button>
  </div>
</form>
