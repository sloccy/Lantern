<h3>Assign Service</h3>
<div class="bg-body-secondary rounded p-3 mb-4 small">
  <strong>{{.Discovered.IP}}:{{.Discovered.Port}}</strong>
  {{if .Discovered.Title}} · {{.Discovered.Title}}{{end}}
  {{if .Discovered.ServiceName}} · <em>{{.Discovered.ServiceName}}</em>{{end}}
</div>
<form hx-post="/api/services"
      hx-swap="none">

  <input type="hidden" name="discovered_id" value="{{.Discovered.ID}}">

  <div class="mb-3">
    <label class="form-label">Service Name</label>
    <input class="form-control" name="name" value="{{.Discovered.Title}}" placeholder="My Service">
  </div>
  <div x-data="{direct: false}">
    <div class="mb-3" x-show="!direct">
      <label class="form-label">Subdomain</label>
      <div x-data="{sub: '{{or .Discovered.SuggestedSubdomain .Discovered.ServiceName}}'}">
        <input class="form-control" name="subdomain" x-model="sub" required placeholder="myservice">
        <div class="form-text" x-text="sub ? sub + '.{{.Domain}}' : ''"></div>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Category</label>
      <input class="form-control" name="category" list="categories-list" placeholder="Optional">
      <datalist id="categories-list">
        {{range .Categories}}<option value="{{.}}">{{end}}
      </datalist>
    </div>
    <div class="d-flex flex-wrap gap-3 mb-3 align-items-center">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="cb-direct" name="direct_only" x-model="direct">
        <label class="form-check-label" for="cb-direct">Direct link</label>
      </div>
      {{if .TunnelEnabled}}
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="cb-tunnel" name="tunnel">
        <label class="form-check-label" for="cb-tunnel">Cloudflare Tunnel</label>
      </div>
      {{end}}
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="cb-skip-health" name="skip_health">
        <label class="form-check-label" for="cb-skip-health">Skip health check</label>
      </div>
    </div>
  </div>
  <div class="d-flex gap-2 justify-content-end mt-3">
    <button type="button" class="btn btn-outline-secondary" @click="$dispatch('closemodal')">Cancel</button>
    <button type="submit" class="btn btn-warning">Assign</button>
  </div>
</form>
