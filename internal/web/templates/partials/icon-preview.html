<div id="icon-preview">
  {{if isDataIcon .Icon}}
  <img src="{{safeURL .Icon}}" width="64" height="64"
       style="border-radius:10px;object-fit:contain;background:var(--bs-tertiary-bg)">
  {{else if .Target}}
  <img src="{{safeURL (faviconURL .Target)}}" width="64" height="64"
       style="border-radius:10px;object-fit:contain;background:var(--bs-tertiary-bg)"
       onerror="this.style.display='none'">
  {{else}}
  <div style="width:64px;height:64px;background:var(--bs-tertiary-bg);border-radius:10px;
              display:flex;align-items:center;justify-content:center;font-size:2rem">📦</div>
  {{end}}
</div>
