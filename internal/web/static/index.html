<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lantern</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div id="htmx-topbar"></div>

<header class="header">
  <div class="logo">
    <img src="/logo.png" class="logo-img" alt="Lantern">
    <span class="logo-text">Lantern</span>
  </div>
  <input id="search-input" class="search-input form-control flex-fill rounded-pill" type="search"
         name="q"
         placeholder="Search… ( / )" autocomplete="off">
  <div class="header-right">
    <span id="header-clock" class="header-clock"></span>
    <button id="edit-layout-btn" class="btn btn-outline-secondary">✎ Edit Layout</button>
    <a href="/manage" class="btn btn-outline-secondary">⚙ Manage</a>
  </div>
</header>

<div id="sysinfo-wrapper" class="bg-poll"
     hx-get="/fragments/sysinfo"
     hx-trigger="load, every 5s"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"><div class="spinner-border spinner-border-sm" role="status"></div></div>
</div>

<div id="services-grid" class="grid-root"
     hx-get="/fragments/services"
     hx-trigger="load, input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"><div class="spinner-border spinner-border-sm" role="status"></div></div>
</div>

<div id="bookmarks-home"
     hx-get="/fragments/bookmarks"
     hx-trigger="load, input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"><div class="spinner-border spinner-border-sm" role="status"></div></div>
</div>

<!-- Modal -->
<div class="modal fade" id="app-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body position-relative">
        <button type="button" class="btn-close position-absolute top-0 end-0 m-3"
                data-bs-dismiss="modal" aria-label="Close"></button>
        <div id="modal-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div class="toast align-items-center border-0" id="app-toast" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toast-msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  const _topbar = document.getElementById('htmx-topbar');
  htmx.on('htmx:beforeRequest', (e) => {
    if (!e.detail.elt.classList.contains('bg-poll')) _topbar.classList.add('active');
  });
  htmx.on('htmx:afterRequest', () => _topbar.classList.remove('active'));
</script>
</body>
</html>
