<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lantern</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body x-data="{
        modalOpen: false,
        editMode: false,
        focusSearch(e) {
          const tag = document.activeElement.tagName;
          if (tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
          e.preventDefault();
          document.getElementById('search-input')?.focus();
        },
        clearSearch() {
          const tag = document.activeElement.tagName;
          if (tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
          const s = document.getElementById('search-input');
          if (s && s.value) { s.value=''; s.dispatchEvent(new Event('input',{bubbles:true})); s.blur(); }
        }
      }"
      :class="{'edit-layout-mode': editMode}"
      @keydown.window="$event.key==='/'&&focusSearch($event)"
      @keydown.escape.window="clearSearch()"
      @closeModal.window="modalOpen = false"
      @openModal.window="modalOpen = true">

<div id="htmx-topbar"></div>

<header class="header">
  <div class="logo">
    <img src="/logo.png" class="logo-img" alt="Lantern">
    <span class="logo-text">Lantern</span>
  </div>
  <input id="search-input" class="search-input form-control" type="search"
         name="q"
         placeholder="Search… ( / )" autocomplete="off">
  <div class="header-right">
    <span id="header-clock" class="header-clock"
          x-data="{
            t: '',
            init() { this.tick(); setInterval(() => this.tick(), 1000); },
            tick() {
              const d = new Date();
              this.t = d.toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'})
                     + '\u2002' + d.toLocaleTimeString('en-GB');
            }
          }" x-text="t"></span>
    <button @click="editMode = !editMode" :class="editMode ? 'btn btn-warning' : 'btn btn-outline-secondary'">✎ Edit Layout</button>
    <a href="/manage" class="btn btn-outline-secondary">⚙ Manage</a>
  </div>
</header>

<div id="sysinfo-wrapper"
     hx-get="/fragments/sysinfo"
     hx-trigger="load, every 5s"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"></div>
</div>

<div id="services-grid" class="grid-root"
     hx-get="/fragments/services"
     hx-trigger="load, input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"></div>
</div>

<div id="bookmarks-home"
     hx-get="/fragments/bookmarks"
     hx-trigger="load, input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"></div>
</div>

<!-- Modal -->
<div class="modal-backdrop" x-show="modalOpen" style="display:none"
     @click.self="modalOpen = false">
  <div class="modal" @keydown.escape.window="modalOpen = false">
    <button class="modal-close" @click="modalOpen = false">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- Toast -->
<div x-data="{show:false, msg:'', type:'success', _t:null}"
     @showToast.window="
       clearTimeout(_t);
       msg=event.detail.msg; type=event.detail.type||'success';
       show=true; _t=setTimeout(()=>show=false, 3500)"
     x-show="show" :class="'toast '+type" x-text="msg"
     style="display:none"></div>

<script src="/app.js"></script>
<script>
  const _topbar = document.getElementById('htmx-topbar');
  htmx.on('htmx:beforeRequest', () => _topbar.classList.add('active'));
  htmx.on('htmx:afterRequest',  () => _topbar.classList.remove('active'));
</script>
</body>
</html>
