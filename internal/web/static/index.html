<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lantern</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body x-data="{
        _modal: null,
        editMode: false,
        init() { this._modal = new bootstrap.Modal(document.getElementById('app-modal')); },
        focusSearch(e) {
          const tag = document.activeElement.tagName;
          if (tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
          e.preventDefault();
          document.getElementById('search-input')?.focus();
        },
        clearSearch() {
          const tag = document.activeElement.tagName;
          if (tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT') return;
          const s = document.getElementById('search-input');
          if (s && s.value) { s.value=''; s.dispatchEvent(new Event('input',{bubbles:true})); s.blur(); }
        }
      }"
      :class="{'edit-layout-mode': editMode}"
      @keydown.window="$event.key==='/'&&focusSearch($event)"
      @keydown.escape.window="clearSearch()"
      @closemodal.window="_modal.hide()"
      @openmodal.window="_modal.show()">

<div id="htmx-topbar"></div>

<header class="header">
  <div class="logo">
    <img src="/logo.png" class="logo-img" alt="Lantern">
    <span class="logo-text">Lantern</span>
  </div>
  <input id="search-input" class="search-input form-control flex-fill rounded-pill" type="search"
         name="q"
         placeholder="Search… ( / )" autocomplete="off">
  <div class="header-right">
    <span id="header-clock" class="header-clock"
          x-data="{
            t: '',
            init() { this.tick(); setInterval(() => this.tick(), 1000); },
            tick() {
              const d = new Date();
              this.t = d.toLocaleDateString('en',{weekday:'short',day:'numeric',month:'short'})
                     + '\u2002' + d.toLocaleTimeString('en-GB');
            }
          }" x-text="t"></span>
    <button @click="editMode = !editMode" :class="editMode ? 'btn btn-warning' : 'btn btn-outline-secondary'">✎ Edit Layout</button>
    <a href="/manage" class="btn btn-outline-secondary">⚙ Manage</a>
  </div>
</header>

<div id="sysinfo-wrapper"
     hx-get="/fragments/sysinfo"
     hx-trigger="load, every 5s"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"><div class="spinner-border spinner-border-sm" role="status"></div></div>
</div>

<div id="services-grid" class="grid-root"
     hx-get="/fragments/services"
     hx-trigger="load, input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"><div class="spinner-border spinner-border-sm" role="status"></div></div>
</div>

<div id="bookmarks-home"
     hx-get="/fragments/bookmarks"
     hx-trigger="load, input from:#search-input delay:200ms"
     hx-include="#search-input"
     hx-swap="innerHTML">
  <div class="htmx-indicator section-spinner"><div class="spinner-border spinner-border-sm" role="status"></div></div>
</div>

<!-- Modal -->
<div class="modal fade" id="app-modal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-body position-relative">
        <button type="button" class="btn-close position-absolute top-0 end-0 m-3"
                data-bs-dismiss="modal" aria-label="Close"></button>
        <div id="modal-content"></div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3"
     x-data="{msg:'', type:'success',
       init() { this._el = new bootstrap.Toast(this.$refs.toast, {autohide:true, delay:3500}); }
     }"
     @showtoast.window="msg=$event.detail.msg; type=$event.detail.type||'success'; _el.show();">
  <div class="toast align-items-center border-0"
       :class="type==='error' ? 'text-bg-danger' : 'text-bg-success'"
       role="alert" x-ref="toast">
    <div class="d-flex">
      <div class="toast-body" x-text="msg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  const _topbar = document.getElementById('htmx-topbar');
  htmx.on('htmx:beforeRequest', () => _topbar.classList.add('active'));
  htmx.on('htmx:afterRequest',  () => _topbar.classList.remove('active'));
</script>
</body>
</html>
